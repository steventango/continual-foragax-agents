<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Network Architectures</title>
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10.9.5/dist/mermaid.esm.min.mjs';

        const transformerCSS = `
            .node rect, .node circle, .node polygon, .node path {
                stroke-width: 2px !important;
                rx: 8px !important;
                ry: 8px !important;
            }
            .styleInput rect { fill: #fbcfe8 !important; stroke: #f472b6 !important; }
            .styleNorm rect { fill: #fef9c3 !important; stroke: #facc15 !important; }
            .styleMlp rect { fill: #e0f2fe !important; stroke: #38bdf8 !important; }
            .styleRnn rect { fill: #ffedd5 !important; stroke: #fb923c !important; }
            .styleHead rect { fill: #fae8ff !important; stroke: #e879f9 !important; }
            .styleOut rect { fill: #f0fdf4 !important; stroke: #4ade80 !important; }
            .styleConcat rect { fill: #f8fafc !important; stroke: #64748b !important; stroke-dasharray: 4 4 !important; }
            .nodeLabel, .labelText { color: #0f172a !important; font-weight: 600 !important; font-family: sans-serif !important; }
            .cluster rect { fill: #f1f5f9 !important; stroke: #cbd5e1 !important; stroke-width: 2px !important; rx: 12px !important; ry: 12px !important; }
            .cluster-label { color: #475569 !important; font-weight: 700 !important; font-family: sans-serif !important; }
        `;

        mermaid.initialize({
            startOnLoad: false,
            theme: 'base',
            themeVariables: {
                primaryColor: '#ffffff',
                primaryTextColor: '#0f172a',
                primaryBorderColor: '#0f172a',
                lineColor: '#0f172a',
                secondaryColor: '#f1f5f9',
                tertiaryColor: '#ffffff',
                fontSize: '13px',
                fontFamily: 'sans-serif'
            },
            themeCSS: transformerCSS,
            securityLevel: 'loose'
        });
        window.mermaid = mermaid;
    </script>
    <style>
        body {
            font-family: sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
            background-color: #f8fafc;
            color: #0f172a;
            margin: 0;
            padding: 2rem;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 800;
            margin-bottom: 2rem;
            text-align: center;
            color: #1e293b;
        }

        .tabs-container {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid #e2e8f0;
            min-height: 700px;
        }

        .tabs-l1 {
            display: flex;
            background-color: #f1f5f9;
            border-bottom: 2px solid #e2e8f0;
            flex-wrap: wrap;
        }

        .tab-l1 {
            padding: 1rem 1.5rem;
            cursor: pointer;
            font-weight: 700;
            color: #64748b;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }

        .tab-l1:hover {
            color: #1e293b;
            background-color: #e2e8f0;
        }

        .tab-l1.active {
            color: #38bdf8;
            border-bottom-color: #38bdf8;
            background-color: white;
        }

        .tabs-l2 {
            display: flex;
            padding: 1rem;
            background-color: #ffffff;
            gap: 0.5rem;
            border-bottom: 1px solid #f1f5f9;
            flex-wrap: wrap;
        }

        .tab-l2 {
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.875rem;
            color: #94a3b8;
            border-radius: 0.5rem;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }

        .tab-l2:hover {
            background-color: #f8fafc;
            color: #1e293b;
        }

        .tab-l2.active {
            background-color: #38bdf8;
            color: white;
            border-color: #0ea5e9;
        }

        .group-content {
            display: none;
        }

        .group-content.active {
            display: block;
        }

        .tab-content {
            display: none;
            padding: 2rem;
        }

        .tab-content.active {
            display: block;
        }

        .agent-info {
            margin-bottom: 1rem;
            padding: 1rem;
            background-color: #f8fafc;
            border-radius: 0.5rem;
            border-left: 4px solid #38bdf8;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .agent-info h3 {
            margin: 0 0 0.25rem 0;
            color: #1e293b;
        }

        .agent-info p {
            margin: 0;
            color: #64748b;
            font-size: 0.875rem;
        }

        .param-badge {
            background: #0f172a;
            color: white;
            padding: 0.35rem 0.75rem;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 700;
            font-family: monospace;
            white-space: nowrap;
        }

        .mermaid {
            display: flex;
            justify-content: center;
            min-height: 400px;
            width: 100%;
            overflow: visible;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .mermaid[data-processed="true"] {
            opacity: 1;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: #94a3b8;
            font-size: 1rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Learning Agent Architectures</h1>
        <div id="loading" class="loading">Loading architecture data…</div>
        <div id="tabs-container" class="tabs-container" style="display:none"></div>
    </div>

    <script>
        // ── Tab groups definition ────────────────────────────────────────────
        const GROUPS = [
            {
                id: "dqn-group", label: "DQN Variants",
                variants: ["DQN_LN_RT", "DQN_LN", "DQN"]
            },
            {
                id: "drqn-group", label: "DRQN Variants",
                variants: ["DRQN_LN_0_2", "DRQN_LN_1_1", "DRQN_0_2", "DRQN_1_1"]
            },
            {
                id: "ppo-group", label: "PPO Variants",
                variants: ["PPO_LN_RT_128", "PPO_LN_128", "PPO_128"]
            },
            {
                id: "ppo-rtu-group", label: "PPO-RTU Variants",
                variants: ["PPO-RTU_LN_128_512", "PPO-RTU_LN_128", "PPO-RTU_128_512", "PPO-RTU_128"]
            },
        ];

        function fmt(n) {
            return n.toLocaleString();
        }

        // ── Build HTML structure from arch data ──────────────────────────────
        function buildUI(archData) {
            const container = document.getElementById('tabs-container');
            document.getElementById('loading').style.display = 'none';
            container.style.display = 'block';

            // L1 tabs bar
            const l1Bar = document.createElement('div');
            l1Bar.className = 'tabs-l1';
            GROUPS.forEach((g, gi) => {
                const t = document.createElement('div');
                t.className = 'tab-l1' + (gi === 0 ? ' active' : '');
                t.textContent = g.label;
                t.dataset.target = g.id;
                l1Bar.appendChild(t);
            });
            container.appendChild(l1Bar);

            // Groups
            GROUPS.forEach((g, gi) => {
                const group = document.createElement('div');
                group.id = g.id;
                group.className = 'group-content' + (gi === 0 ? ' active' : '');

                // L2 tabs bar
                const l2Bar = document.createElement('div');
                l2Bar.className = 'tabs-l2';

                g.variants.forEach((vname, vi) => {
                    const data = archData[vname];
                    if (!data) return;
                    const t = document.createElement('div');
                    t.className = 'tab-l2' + (vi === 0 ? ' active' : '');
                    t.textContent = vname;
                    t.dataset.target = `tab-${vname.replace(/[^a-z0-9]/gi, '-').toLowerCase()}`;
                    l2Bar.appendChild(t);
                });
                group.appendChild(l2Bar);

                // Tab contents
                g.variants.forEach((vname, vi) => {
                    const data = archData[vname];
                    if (!data) return;
                    const tabId = `tab-${vname.replace(/[^a-z0-9]/gi, '-').toLowerCase()}`;

                    const content = document.createElement('div');
                    content.id = tabId;
                    content.className = 'tab-content' + (vi === 0 ? ' active' : '');

                    content.innerHTML = `
                        <div class="agent-info">
                            <div>
                                <h3>${data.title || vname}</h3>
                                <p>${data.description || ''} &nbsp;·&nbsp; FOV ${data.fov}×${data.fov}×3</p>
                            </div>
                            <span class="param-badge">${fmt(data.total_params)} params</span>
                        </div>
                        <div class="mermaid">${data.mermaid_source}</div>
                    `;
                    group.appendChild(content);
                });

                container.appendChild(group);
            });

            setupTabs();
            setTimeout(renderActiveTab, 500);
        }

        // ── Tab interaction ──────────────────────────────────────────────────
        function setupTabs() {
            document.querySelectorAll('.tab-l1').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelector('.tab-l1.active')?.classList.remove('active');
                    document.querySelector('.group-content.active')?.classList.remove('active');
                    tab.classList.add('active');
                    document.getElementById(tab.dataset.target)?.classList.add('active');
                    setTimeout(renderActiveTab, 100);
                });
            });

            document.querySelectorAll('.tab-l2').forEach(tab => {
                tab.addEventListener('click', () => {
                    const group = tab.closest('.group-content');
                    group?.querySelector('.tab-l2.active')?.classList.remove('active');
                    group?.querySelector('.tab-content.active')?.classList.remove('active');
                    tab.classList.add('active');
                    group?.querySelector('#' + tab.dataset.target)?.classList.add('active');
                    renderActiveTab();
                });
            });
        }

        async function renderActiveTab() {
            const activeGroup = document.querySelector('.group-content.active');
            if (!activeGroup) return;
            const activeContent = activeGroup.querySelector('.tab-content.active');
            if (!activeContent) return;
            const mermaidDiv = activeContent.querySelector('.mermaid');
            if (!mermaidDiv || mermaidDiv.getAttribute('data-processed') === 'true') return;

            await new Promise(r => setTimeout(r, 50));
            const selector = '#' + activeContent.id + ' .mermaid';
            if (window.mermaid) {
                try {
                    await window.mermaid.run({ querySelector: selector });
                } catch (e) {
                    console.error('Mermaid render failed', e, mermaidDiv.textContent.substring(0, 200));
                }
            }
        }

        // ── Load data ────────────────────────────────────────────────────────
        fetch('arch_data.json')
            .then(r => r.json())
            .then(buildUI)
            .catch(err => {
                document.getElementById('loading').textContent = 'Failed to load arch_data.json: ' + err;
            });
    </script>
</body>

</html>
